# CI — institutionalises the standing rule's local-prod gate on every push.
#
# Runs: production build → unit tests → the deterministic Playwright subset
# against the built app. Excluded by design:
#   - chat-input.spec.ts  → drives a REAL Anthropic generation (needs API credits)
#   - longtrip.spec.ts    → gated behind RUN_LONGTRIP=1 (real long generation)
# Everything else mocks /api/chat or seeds localStorage, so no secrets are
# needed; live-prices degrades gracefully without provider keys and asserts the
# degradation path.
name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm run test:unit

      # A dummy key satisfies the SDK constructor at build/import time; the
      # deterministic tests mock /api/chat in-browser and never reach Anthropic.
      - name: Production build
        run: npm run build
        env:
          ANTHROPIC_API_KEY: ci-dummy-key

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Start production server
        run: |
          npx next start -p 3000 &
          for i in $(seq 1 30); do curl -sf http://localhost:3000/app > /dev/null && exit 0; sleep 2; done
          echo "server failed to start" && exit 1
        env:
          ANTHROPIC_API_KEY: ci-dummy-key

      - name: Playwright (deterministic subset)
        run: npx playwright test chunked deeplinks features generation live-prices popover wizard
        env:
          BASE_URL: http://localhost:3000

      - name: Upload traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: test-results/
          retention-days: 7
